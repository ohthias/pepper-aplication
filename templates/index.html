<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeiaMetria - Pepper</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <div id="pepperStatus"></div>
    <div id="loadingOverlay">
      <div class="load-spinner"></div>
    </div>
    <div class="screen active" id="inicio">
      <div
        style="
          display: flex;
          gap: 2.5rem;
          align-items: center;
          flex-wrap: wrap;
          justify-content: center;
        "
      >
        <img
          src="../static/imagens/LogoLeiaMetria.png"
          alt="LeiaMetria"
          style="max-width: 180px; height: auto; animation: up 0.5s ease both"
        />
        <img
          src="../static/imagens/SESI_MAKERTHON_LOGO.png"
          alt="Makerthon"
          style="
            max-width: 180px;
            height: auto;
            animation: up 0.5s ease 0.1s both;
          "
        />
      </div>
      <div class="load-track" style="animation: up 0.4s ease 0.25s both">
        <div class="load-fill" id="loadFill"></div>
      </div>
      <span
        class="load-label"
        id="loadLabel"
        style="animation: up 0.4s ease 0.3s both"
        >Inicializando...</span
      >
    </div>

    <!-- ═══════════════════════════════════
     2 — AGUARDANDO CARTÃO
═══════════════════════════════════ -->
    <div class="screen" id="aguardando">
      <div
        class="stg"
        style="
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 1.5rem;
          width: 100%;
          max-width: 440px;
        "
      >
        <img
          src="../static/imagens/LogoLeiaMetria.png"
          alt="LeiaMetria"
          style="max-width: 150px; height: auto"
        />
        <h1>Escaneie um cartão</h1>
        <p>Aproxime o cartão do sensor para começar.</p>

        <!-- Scan icon -->
        <div class="scan-box">
          <svg viewBox="0 0 120 120" style="width: 120px; height: 120px">
            <rect
              x="8"
              y="8"
              width="104"
              height="104"
              rx="10"
              fill="none"
              stroke="var(--border)"
              stroke-width="1.5"
            />
            <rect
              x="8"
              y="8"
              width="26"
              height="3"
              fill="var(--accent)"
              rx="1.5"
            />
            <rect
              x="8"
              y="8"
              width="3"
              height="26"
              fill="var(--accent)"
              rx="1.5"
            />
            <rect
              x="86"
              y="8"
              width="26"
              height="3"
              fill="var(--accent)"
              rx="1.5"
            />
            <rect
              x="109"
              y="8"
              width="3"
              height="26"
              fill="var(--accent)"
              rx="1.5"
            />
            <rect
              x="8"
              y="109"
              width="26"
              height="3"
              fill="var(--accent)"
              rx="1.5"
            />
            <rect
              x="8"
              y="86"
              width="3"
              height="26"
              fill="var(--accent)"
              rx="1.5"
            />
            <rect
              x="86"
              y="109"
              width="26"
              height="3"
              fill="var(--accent)"
              rx="1.5"
            />
            <rect
              x="109"
              y="86"
              width="3"
              height="26"
              fill="var(--accent)"
              rx="1.5"
            />
            <line
              x1="8"
              y1="60"
              x2="112"
              y2="60"
              stroke="var(--accent)"
              stroke-width="1.5"
              opacity=".5"
            >
              <animateTransform
                attributeName="transform"
                type="translate"
                values="0,0;0,44;0,-44;0,0"
                dur="2.8s"
                repeatCount="indefinite"
              />
            </line>
          </svg>
        </div>

        <!-- Simulação dev -->
        <div
          style="width: 100%; display: flex; flex-direction: column; gap: 8px"
        >
          <button
            class="btn"
            onclick="escanearCartaoReal()"
            style="justify-content: center"
          >
            Iniciar
          </button>
        </div>
      </div>
    </div>

    <!-- ═══════════════════════════════════
     3 — CARTÃO IDENTIFICADO
═══════════════════════════════════ -->
    <div class="screen" id="cartaoSelecionado">
      <button class="btn-back" onclick="navigate('aguardando')">
        ← Voltar
      </button>
      <div class="card stg" style="text-align: center">
        <p
          style="
            font-size: 12px;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.75rem;
          "
        >
          Cartão identificado
        </p>
        <div class="badge" id="tagCartao" style="margin: 0 auto 0.75rem">—</div>
        <p
          style="
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-3);
            margin-bottom: 0.5rem;
          "
          id="nivelCartao"
        >
          —
        </p>
        <h1
          style="font-size: 2rem; margin-bottom: 1.25rem"
          id="nomeFormaCartao"
        >
          —
        </h1>
        <div id="svgFormaCartao"></div>
        <button
          class="btn"
          onclick="irParaConteudo()"
          style="width: 100%; justify-content: center; margin-top: 1.25rem"
        >
          Continuar
        </button>
      </div>
    </div>

    <!-- ═══════════════════════════════════
     4 — CONTEÚDO DA FORMA
═══════════════════════════════════ -->
    <div class="screen" id="telaConteudo">
      <button class="btn-back" onclick="navigate('cartaoSelecionado')">
        ← Voltar
      </button>
      <div class="card stg" style="max-width: 600px">
        <h1
          id="tituloConteudo"
          style="text-align: left; font-size: 1.5rem; margin-bottom: 1rem"
        >
          —
        </h1>
        <div id="svgFormaConteudo"></div>
        <p id="textoConteudo" style="text-align: left; margin-top: 0.75rem">
          —
        </p>
        <div class="formula" id="formulaConteudo" style="margin-top: 1.25rem">
          —
        </div>
        <button
          class="btn"
          onclick="irParaPergunta()"
          style="width: 100%; justify-content: center; margin-top: 1.5rem"
        >
          Ir para a pergunta
        </button>
      </div>
    </div>

    <!-- ═══════════════════════════════════
     5 — PERGUNTA
═══════════════════════════════════ -->
    <div class="screen" id="telaPergunta">
      <div class="q-header">
        <button class="btn-back" onclick="navigate('telaConteudo')">
          ← Voltar
        </button>
        <div class="q-pill">⚡ Pergunta</div>
      </div>

      <div class="q-bubble">
        <h1 id="textoPergunta">—</h1>
      </div>

      <div class="q-grid" id="listaAlternativas"></div>
    </div>

    <!-- ═══════════════════════════════════
     6 — ERRO / EXPLICAÇÃO
═══════════════════════════════════ -->
    <div class="screen" id="erroExplicacao">
      <button class="btn-back" onclick="irParaPergunta()">
        ← Tentar novamente
      </button>

      <div class="result-icon" id="iconErro">🤔</div>

      <div class="card stg" style="text-align: center; max-width: 560px">
        <!-- 🔥 título dinâmico -->
        <h1 id="tituloErro" style="font-size: 1.5rem; margin-bottom: 0.5rem">
          Quase lá!
        </h1>

        <!-- 🔥 subtítulo dinâmico -->
        <p id="subtituloErro" style="margin-bottom: 1rem">
          A resposta correta é:
        </p>

        <!-- fórmula / dica -->
        <div class="formula" id="formulaErro">—</div>

        <!-- explicação completa (só na 3ª tentativa) -->
        <p
          id="textoErro"
          style="
            text-align: left;
            margin-top: 1.25rem;
            font-size: 14px;
            line-height: 1.7;
          "
        >
          —
        </p>

        <!-- 🔥 botão tentar novamente (tentativas 1 e 2) -->
        <button
          id="btnTentarNovamente"
          class="btn"
          onclick="irParaPergunta()"
          style="width: 100%; justify-content: center; margin-top: 1.5rem"
        >
          Tentar novamente
        </button>

        <!-- 🔥 botão avançar (só na 3ª tentativa) -->
        <button
          id="btnVerResposta"
          class="btn"
          onclick="
            navigate('aguardando');
            estado.tentativas = 0;
            voltarAguardando();
          "
          style="
            width: 100%;
            justify-content: center;
            margin-top: 1rem;
            display: none;
          "
        >
          Escanear novo cartão
        </button>
      </div>
    </div>

    <!-- ═══════════════════════════════════
     7 — SUCESSO
═══════════════════════════════════ -->
    <div class="screen" id="sucesso">
      <div class="result-icon">🏆</div>
      <div class="card stg" style="text-align: center; max-width: 480px">
        <h1 style="font-size: 1.75rem; margin-bottom: 0.375rem">Parabéns!</h1>
        <p>
          Você acertou e dominou o
          <strong
            id="nomeFormaSucesso"
            style="color: var(--text); font-weight: 600"
            >—</strong
          >.
        </p>
        <div class="formula" id="formulaSucesso" style="margin-top: 1.25rem">
          —
        </div>
        <button
          class="btn"
          onclick="
            navigate('aguardando');
            pepper('sessao_concluida', estado.forma + '_' + estado.nivel);
            voltarAguardando();
          "
          style="width: 100%; justify-content: center; margin-top: 1.5rem"
        >
          Escanear novo cartão
        </button>
      </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  </body>
</html>
